name: citation-lint

# Runs @jeldon/verify's citation linter over every article, driven by
# pack.citation.policy. Under 'search-urls-only' it flags fabricated-citation
# patterns; under 'direct-source-urls' / 'verifier-required' it is a no-op.

on:
  pull_request:
    paths:
      - 'src/content/articles/**'
      - 'jeldon.config.ts'
  push:
    branches: [main]

jobs:
  citation-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint citations under the Domain Pack policy
        run: pnpm run check:citations
