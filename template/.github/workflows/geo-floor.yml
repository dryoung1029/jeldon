name: geo-floor

# Fails the PR if any published article scores below its category GEO target.
# Uses the same @jeldon/core-scoring the editor dial uses — no mirrored logic.

on:
  pull_request:
    paths:
      - 'src/content/articles/**'
      - 'jeldon.config.ts'
  push:
    branches: [main]

jobs:
  geo-floor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Score articles against category targets
        run: pnpm run check:geo
